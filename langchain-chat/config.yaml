app:
  name: LangChain Chat
  environment: dev

llm:
  default_model: mock-local
  timeout_seconds: 30
  max_retries: 3
  models:
    - name: mock-local
      provider: mock
      base_url: ""
    - name: gpt-4o-mini
      provider: openai
      base_url: ${API_BASE_URL}

storage:
  type: sqlite
  sqlite:
    path: data/sqlite/app.db
  mysql:
    host: ${MYSQL_HOST}
    port: ${MYSQL_PORT}
    user: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    database: ${MYSQL_DATABASE}
  file:
    root: data/file

exports:
  root: data/users

logging:
  config_path: config/logging.yaml
